<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Login</title>
  </head>
  <body>
    <div class="container" id="main-container">
      <!--Login-->
      <div class="form-box login">
        <form action="#" method="post" id="miFormulario">
          <h1>Login</h1>

          <!--Usuario-->
          <div class="input-box">
            <input
              id="user"
              type="text"
              name="user"
              placeholder="Username"
              required
            />
            <i class="fa-solid fa-user"></i>
            <p class="warnings" id="user-warnings"></p>
          </div>

          <!--Contraseña-->
          <div class="input-box">
            <input
              id="password"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
            <i class="fa-solid fa-lock"></i>
            <p class="warnings" id="password-warnings"></p>
          </div>

          <!--Forgot-link-->
          <div class="forgot-link">
            <a href="#">Forgot password? </a>
          </div>

          <!--Boton y social icons-->
          <button type="submit" class="btn">Login</button>
          <p>or login with social platforms</p>
          <div class="social-icons">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
          </div>

          <div class="have-account" id="btn-show-register">
            <p>Don't have an account? <strong>Register</strong></p>
          </div>
        </form>
      </div>

      <!--Register-->
      <div class="form-box register">
        <form action="#" method="post" id="form-register">
          <div class="have-account back-to-login" id="btn-show-login">
            <p>Already have an account? <strong>Login</strong></p>
          </div>

          <h1>Register</h1>

          <!--Usuario-->
          <div class="input-box">
            <input
              id="user-reg"
              type="text"
              name="user"
              placeholder="Username"
              required
            />
            <i class="fa-solid fa-user"></i>
            <p class="warnings" id="user-warning-reg"></p>
          </div>

          <!--Email-->
          <div class="input-box">
            <input
              id="email-reg"
              type="email"
              name="email"
              placeholder="Email"
              required
            />
            <i class="fa-solid fa-envelope"></i>
            <p class="warnings" id="email-warning-reg"></p>
          </div>

          <!--Password-->
          <div class="input-box">
            <input
              id="pass-reg"
              type="password"
              name="password"
              placeholder="Password"
              required
            />
            <i class="fa-solid fa-lock"></i>
            <p class="warnings" id="pass-warning-reg"></p>
          </div>

          <!--confirmPassword-->
          <div class="input-box">
            <input
              id="pass-confirm-reg"
              type="password"
              name="confirm-password"
              placeholder="Confirm Password"
              required
            />
            <i class="fa-solid fa-lock"></i>
            <p class="warnings" id="cpass-warning-reg"></p>
          </div>

          <!--boton-->
          <button type="submit" class="btn">Register</button>
          <p>or register with social platforms</p>
          <div class="social-icons-reg">
            <a href="#"><i class="fa-brands fa-google"></i></a>
            <a href="#"><i class="fa-brands fa-facebook"></i></a>
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
          </div>
        </form>
      </div>
    </div>
  </body>
  <script src="./js/scripts.js"></script>
</html>
